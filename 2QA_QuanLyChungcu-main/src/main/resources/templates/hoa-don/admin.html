<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Tất cả hóa đơn</title>
    <link rel="stylesheet" th:href="@{/css/hoadon/admin.css}">
</head>
<body>
<div layout:fragment="content" class="container py-4">

    <div class="mb-4">
        <div class="d-flex align-items-center">
            <div class="p-3 rounded-3 me-3" style="background: var(--emerald-gradient);">
                <i class="bi bi-clipboard-data text-white fs-4"></i>
            </div>
            <div>
                <h2 class="fw-bold text-dark m-0" style="letter-spacing: -0.5px;">Quản lý hóa đơn</h2>
                <p class="text-muted small mb-0">Theo dõi trạng thái thanh toán của tất cả cư dân.</p>
            </div>
        </div>
    </div>

    <div class="invoice-card" th:if="${items != null and !#lists.isEmpty(items)}">
        <div class="table-responsive">
            <table class="table custom-table table-hover mb-0">
                <thead>
                <tr>
                    <th>Người dùng</th>
                    <th>Căn hộ / Phòng</th>
                    <th>Tháng</th>
                    <th>Trạng thái</th>
                    <th class="text-end">Tổng tiền (VNĐ)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="it : ${items}">
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="user-icon" th:text="${#strings.substring(it.username,0,1).toUpperCase()}">U</div>
                            <span class="fw-bold text-dark" th:text="${it.username}"></span>
                        </div>
                    </td>

                    <td>
                        <div class="fw-medium text-dark">
                            <i class="bi bi-house-door me-1 small"></i>
                            <span th:text="${it.apartmentName}"></span>
                        </div>
                        <div class="text-muted small">
                            Mã: <span th:text="${it.apartmentCode}"></span> | Phòng: <span th:text="${it.room ?: '-'}"></span>
                        </div>
                    </td>

                    <td>
                        <span class="badge bg-light text-dark border fw-medium" th:text="${it.monthDisplay}"></span>
                    </td>

                    <td>
                        <span th:if="${it.status == 'GREEN'}" class="status-badge badge-paid">
                            <i class="bi bi-check-circle-fill"></i> Đã thanh toán
                        </span>
                        <span th:if="${it.status == 'YELLOW'}" class="status-badge badge-pending">
                            <i class="bi bi-clock-history"></i> Chưa đến hạn
                        </span>
                        <span th:if="${it.status == 'RED'}" class="status-badge badge-overdue">
                            <i class="bi bi-exclamation-triangle-fill"></i> Quá hạn
                        </span>
                    </td>

                    <td class="text-end fw-bold text-primary" style="font-size: 1.1rem;">
                        <span th:text="${#numbers.formatDecimal(it.totalToPay, 0, 'POINT', 0, 'COMMA')}"></span>
                        <small class="text-muted" style="font-size: 0.7rem;"> ₫</small>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${items == null or #lists.isEmpty(items)}" class="invoice-card py-5 text-center">
        <div class="py-4">
            <i class="bi bi-receipt-cutoff text-muted" style="font-size: 4rem;"></i>
            <h5 class="mt-3 text-secondary">Chưa có dữ liệu hóa đơn</h5>
            <p class="text-muted small">Hệ thống hiện tại chưa phát sinh hóa đơn nào.</p>
        </div>
    </div>
</div>
</body>
</html>
