<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Danh sách cư dân đăng ký dịch vụ</title>
    <link rel="stylesheet" th:href="@{/css/quanlydichvu/subscribers.css}">
</head>

<body>
<div layout:fragment="content" class="container py-4">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2" style="font-size: 0.85rem;">
                    <li class="breadcrumb-item"><a th:href="@{/quan-ly-dich-vu}">Dịch vụ</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Danh sách đăng ký</li>
                </ol>
            </nav>
            <h2 class="fw-bold text-dark m-0">
                <i class="bi bi-people-fill me-2" style="color:#6366f1;"></i>Danh sách đăng ký
            </h2>
            <div class="mt-2">
                <span class="badge bg-light text-primary border px-3 py-2" style="font-size: 0.9rem;">
                    Dịch vụ: <strong th:text="${service.name}"></strong>
                </span>
            </div>
        </div>
        <a th:href="@{/quan-ly-dich-vu}" class="btn btn-light border shadow-sm px-3 py-2" style="border-radius:12px; font-weight:600;">
            <i class="bi bi-arrow-left me-1"></i> Quay lại
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success border-0 shadow-sm d-flex align-items-center mb-4" role="alert" style="border-radius:12px; background:#f0fdf4;">
        <i class="bi bi-check-circle-fill me-2 fs-5"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMsg}" class="alert alert-danger border-0 shadow-sm d-flex align-items-center mb-4" role="alert" style="border-radius:12px; background:#fef2f2;">
        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table custom-table table-hover mb-0">
                <thead>
                <tr>
                    <th class="text-center" style="width: 80px;">STT</th>
                    <th>Cư dân</th>
                    <th>Ngày đăng ký</th>
                    <th>Số tiền</th>
                    <th>Trạng thái</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="sub, iterStat : ${subscriptions}">
                    <td class="text-center text-muted fw-bold" th:text="${iterStat.count}">1</td>

                    <td>
                        <div class="d-flex align-items-center">
                            <div class="user-avatar me-3"
                                 th:text="${sub.user.login_name != null ? #strings.substring(sub.user.login_name,0,1).toUpperCase() : 'U'}">U</div>
                            <div>
                                <div class="fw-bold text-dark" th:text="${sub.user.login_name}">Login Name</div>
                                <small class="text-muted">Cư dân hệ thống</small>
                            </div>
                        </div>
                    </td>

                    <td>
                        <div class="text-dark fw-medium">
                            <i class="bi bi-calendar3 me-1 small"></i>
                            <span th:text="${#temporals.format(sub.createdAt, 'dd/MM/yyyy')}"></span>
                        </div>
                        <small class="text-muted" th:text="${#temporals.format(sub.createdAt, 'HH:mm')}"></small>
                    </td>

                    <td>
                        <div th:if="${paymentMap.containsKey(sub.id)}" class="fw-bold text-primary">
                            <span th:text="${#numbers.formatDecimal(paymentMap.get(sub.id).amount, 0, 'POINT', 0, 'COMMA')}"></span> ₫
                        </div>
                        <span th:unless="${paymentMap.containsKey(sub.id)}" class="text-muted italic small">Chưa có dữ liệu</span>
                    </td>

                    <td>
                        <div th:if="${paymentMap.containsKey(sub.id)}">
                                <span th:if="${paymentMap.get(sub.id).status == 'DA_THANH_TOAN'}" class="status-badge status-paid">
                                    <i class="bi bi-check-circle-fill"></i> Đã thanh toán
                                </span>
                            <span th:if="${paymentMap.get(sub.id).status == 'CHUA_THANH_TOAN'}" class="status-badge status-unpaid">
                                    <i class="bi bi-exclamation-circle-fill"></i> Chờ thanh toán
                                </span>
                        </div>
                    </td>

                    <td class="text-center">
                        <form th:if="${paymentMap.containsKey(sub.id)}"
                              th:action="@{/quan-ly-dich-vu/toggle-payment/{paymentId}(paymentId=${paymentMap.get(sub.id).id})}"
                              method="post" class="d-inline">
                            <input type="hidden" name="serviceId" th:value="${service.id}"/>
                            <button type="submit" class="btn btn-sm btn-outline-warning btn-toggle px-3 py-2"
                                    title="Đổi trạng thái thanh toán">
                                <i class="bi bi-arrow-repeat me-1"></i> Đổi TT
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(subscriptions)}">
                    <td colspan="6" class="text-center py-5">
                        <div class="py-4">
                            <i class="bi bi-person-dash text-muted" style="font-size: 3rem;"></i>
                            <h5 class="mt-3 text-secondary">Chưa có cư dân đăng ký</h5>
                            <p class="text-muted small">Dịch vụ này hiện chưa có tài khoản nào đăng ký sử dụng.</p>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
